version: '3.8'

services:
  # Next.js Application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nextjs-flutter-hire
    restart: unless-stopped
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      # Use 'http' instead of 'web' for Coolify
      - "traefik.http.routers.nextjs.rule=Host(`hirededicatedflutterdeveloper.com`)"
      - "traefik.http.routers.nextjs.entrypoints=http"
      - "traefik.http.routers.nextjs.service=nextjs"
      - "traefik.http.services.nextjs.loadbalancer.server.port=3010"
      - "traefik.docker.network=coolify"
      
      # HTTPS router
      - "traefik.http.routers.nextjs-secure.rule=Host(`hirededicatedflutterdeveloper.com`)"
      - "traefik.http.routers.nextjs-secure.entrypoints=https"
      - "traefik.http.routers.nextjs-secure.tls=true"
      - "traefik.http.routers.nextjs-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nextjs-secure.service=nextjs"
      
      # HTTP to HTTPS redirect
      - "traefik.http.routers.nextjs.middlewares=nextjs-redirect"
      - "traefik.http.middlewares.nextjs-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.nextjs-redirect.redirectscheme.permanent=true"

  # WordPress
  wordpress:
    image: wordpress:6.4-apache
    container_name: wordpress-flutter-hire
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wp_secure_2024_password}
      WORDPRESS_DB_NAME: wordpress
      WP_HOME: https://hirededicatedflutterdeveloper.com/cms
      WP_SITEURL: https://hirededicatedflutterdeveloper.com/cms
      # Fix Apache ServerName warning
      APACHE_RUN_USER: www-data
      APACHE_RUN_GROUP: www-data
      APACHE_LOG_DIR: /var/log/apache2
      APACHE_LOCK_DIR: /var/lock/apache2
      APACHE_PID_FILE: /var/run/apache2.pid
    volumes:
      - wordpress_data:/var/www/html
      # Add custom Apache config to fix ServerName warning
      - ./wordpress/apache-servername.conf:/etc/apache2/conf-available/servername.conf:ro
    networks:
      - coolify
    depends_on:
      - mysql
    labels:
      - "traefik.enable=true"
      # HTTP router
      - "traefik.http.routers.wordpress.rule=Host(`hirededicatedflutterdeveloper.com`) && PathPrefix(`/cms`)"
      - "traefik.http.routers.wordpress.entrypoints=http"
      - "traefik.http.routers.wordpress.middlewares=wordpress-redirect,wordpress-stripprefix"
      - "traefik.http.routers.wordpress.service=wordpress"
      
      # HTTPS router
      - "traefik.http.routers.wordpress-secure.rule=Host(`hirededicatedflutterdeveloper.com`) && PathPrefix(`/cms`)"
      - "traefik.http.routers.wordpress-secure.entrypoints=https"
      - "traefik.http.routers.wordpress-secure.tls=true"
      - "traefik.http.routers.wordpress-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.wordpress-secure.middlewares=wordpress-stripprefix"
      - "traefik.http.routers.wordpress-secure.service=wordpress"
      
      # Middlewares
      - "traefik.http.middlewares.wordpress-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.wordpress-redirect.redirectscheme.permanent=true"
      - "traefik.http.middlewares.wordpress-stripprefix.stripprefix.prefixes=/cms"
      - "traefik.http.services.wordpress.loadbalancer.server.port=80"
      - "traefik.docker.network=coolify"

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: mysql-flutter-hire
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wp_secure_2024_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secure_2024_password}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - coolify
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M --max-connections=100

volumes:
  wordpress_data:
  mysql_data:

networks:
  coolify:
    external: true
